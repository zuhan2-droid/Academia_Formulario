<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase de Prueba Gratuita - Academia de Música</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #0a0e27;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        
        .subtitle {
            color: #6b7280;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #0a0e27;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .success-message {
            display: none;
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Clase de Prueba</h1>
        <p class="subtitle">Elige tu instrumento y reserva tu plaza</p>
        
        <form id="formulario">
            <div class="form-group">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="Nombre" required>
            </div>
            
            <div class="form-group">
                <label for="apellido">Apellido *</label>
                <input type="text" id="apellido" name="Apellido" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="Email" required>
            </div>
            
            <div class="form-group">
                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" name="Telefono" required>
            </div>
            
            <div class="form-group">
                <label for="instrumento">Instrumento *</label>
                <select id="instrumento" name="Instrumento" required>
                    <option value="">Selecciona un instrumento</option>
                    <option value="Guitarra">Guitarra</option>
                    <option value="Saxofón">Saxofón</option>
                    <option value="Batería">Batería</option>
                    <option value="Violín">Violín</option>
                </select>
            </div>
            
            <button type="submit">Reservar clase gratuita</button>
            <div class="success-message" id="success">
                ✓ ¡Formulario enviado correctamente!
            </div>
        </form>
    </div>
    
    <script>
        document.getElementById('formulario').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                Nombre: document.getElementById('nombre').value,
                Apellido: document.getElementById('apellido').value,
                Email: document.getElementById('email').value,
                Telefono: document.getElementById('telefono').value,
                Instrumento: document.getElementById('instrumento').value
            };
            
            // Reemplaza esta URL con la de tu formulario n8n
            const webhookUrl = 'https://n8n.deflexxio.com/form-test/ab4fbe50-055c-42e4-93fb-6f47592b9ffe';
            
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                document.getElementById('success').style.display = 'block';
                document.getElementById('formulario').reset();
                setTimeout(() => {
                    document.getElementById('success').style.display = 'none';
                }, 3000);
            })
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
